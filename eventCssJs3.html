<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="range" min="20" max="100" oninput="f1()" value="0">
    <h1>hello</h1>
    <script>
        function f1(){
            let x=document.querySelector("input").value
            console.log(x);
            let y=document.querySelector("h1")
            y.style.fontSize=`${x}px`
        }
    </script>
</body>
</html>
