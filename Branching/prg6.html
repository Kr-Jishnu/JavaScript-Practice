<!-- Q:6)WAP to check whether the number is even or odd ,if the number is even check whether it is positive or negative -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        let a=0
        if (a%2==0){
            if(a==0){
                console.log(`The number ${a} is zero`)
            }
            else if(a>0){
                console.log(`The number ${a} is Positive number`)
            }
            else{
                console.log(`The number ${a} is negative number`)
            }  
        }
        else {
            console.log(`The number ${a} is odd`)
        }
    </script>
 </body>
 </html>
