<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=20
        if (a%5==0){
            console.log(`The number ${a} is divisible by 5`)
        }
        else{
            console.log(`The number ${a} is not divisible by 5`)
        }
    </script>
</body>
</html>
<!-- Q:4)WAP to check whether a number is divisible by 5 or not. -->
