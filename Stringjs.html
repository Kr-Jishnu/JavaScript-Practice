    <script>
    // reverse the given string ---> i/p: "kerala", o/p: alarek
let str = "kerala"

//Program 1
//----------
// using in-build methods (prgm 1)
let rev = str.split("").reverse().join("")
console.log(rev);

//Program 2
//----------------
// without using in-build methods (prgm 2)
let rev2 = ""
for(i=str.length-1; i>=0; i--)
    rev2 += str[i]
console.log(rev2);
</script>
