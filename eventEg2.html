<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="a">
    <input type="text" id="b">
    <br><br>
    <button onclick="f1()">Add</button>
    <button onclick="f2()">Sum</button>
    <h1></h1>
    <h1 id="j"></h1>

    <script>
        function f1(){
            let x=Number(document.querySelector("#a").value)
            let y=Number(document.querySelector("#b").value)
            let z=document.querySelector("h1")
            z.innerHTML=x+y
        }

         function f2(){
            let x=Number(document.querySelector("#a").value)
            let y=Number(document.querySelector("#b").value)
            let z=document.querySelector("h1#j")
            z.innerHTML=x-y
        }

    </script>
</body>
</html>
