<!-- Q:5)WAP to print "Someshwar" if the number is divisible by 3,if the is number is divible by 4 then print "Someshawar private",if it is divisible by both 3 and 4 then print "someshwar private limited" -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        let a=12
        if (a%3==0 && a%4==0){
            console.log(`Someshawar private limited`)
        }
        else if(a%4==0){
            console.log(`Someshawar private`)
        }
        else if(a%3==0){
            console.log(`Someshawar`)
        }
    </script>
    </script>
 </body>
 </html>
